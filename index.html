<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Spam Detector</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* Glowing background effect */
body::before {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: #22c55e;
  filter: blur(150px);
  opacity: 0.3;
  border-radius: 50%;
  top: 20%;
  left: 40%;
}

/* Card */
.container {
  position: relative;
  width: 420px;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  text-align: center;
  animation: fadeIn 1s ease;
}

/* Title */
h1 {
  font-size: 26px;
  margin-bottom: 20px;
}

/* Textarea */
textarea {
  width: 100%;
  height: 120px;
  border-radius: 12px;
  border: none;
  padding: 12px;
  background: rgba(255,255,255,0.1);
  color: white;
  outline: none;
  resize: none;
  font-size: 14px;
}

/* Button */
button {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #22c55e;
}

/* Result */
#result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}

/* States */
.spam {
  color: #ef4444;
  text-shadow: 0 0 15px #ef4444;
}

.not-spam {
  color: #22c55e;
  text-shadow: 0 0 15px #22c55e;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h1>🚀 AI Spam Detector</h1>

  <textarea id="email" placeholder="Paste email content here..."></textarea>

  <button onclick="checkSpam()">Analyze</button>

  <div id="result"></div>
</div>

<script>
async function checkSpam() {
  const text = document.getElementById("email").value;
  const resultDiv = document.getElementById("result");

  if (!text) {
    alert("Enter email text");
    return;
  }

  resultDiv.innerText = "Analyzing...";
  resultDiv.className = "";

  try {
    const response = await fetch("https://span-detection.onrender.com/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: text })
    });

    const data = await response.json();

    if (data.prediction === "Spam") {
      resultDiv.innerText = "🚨 Spam Detected";
      resultDiv.className = "spam";
    } else {
      resultDiv.innerText = "✅ Not Spam";
      resultDiv.className = "not-spam";
    }

  } catch (error) {
    resultDiv.innerText = "⚠️ Server Error";
  }
}
</script>

</body>
</html>
